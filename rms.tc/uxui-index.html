<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UXUI · RMS Docs</title>
<link rel="stylesheet" href="style.css">
<style>
  .coming-soon {
    max-width: 720px;
    margin: 80px auto;
    padding: 60px 40px;
    text-align: center;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
  }
  .coming-soon__title {
    font-size: 24px;
    font-weight: 700;
    color: #1a3a5c;
    margin: 0 0 12px 0;
  }
  .coming-soon__subtitle {
    font-size: 14px;
    color: #64748b;
    margin: 0 0 32px 0;
    line-height: 1.6;
  }
  .coming-soon__sections {
    display: grid;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
    text-align: left;
  }
  .coming-soon__item {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .coming-soon__item-name {
    font-weight: 600;
    color: #1a3a5c;
    font-size: 14px;
  }
  .coming-soon__item-desc {
    font-size: 12px;
    color: #64748b;
    margin-top: 4px;
  }
  .coming-soon__badge {
    background: #fde68a;
    color: #92400e;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body data-top="uxui" data-sub="ux-scenario" data-meta="RMS Docs · v0.3">

<main>
  <div class="coming-soon">
    <h1 class="coming-soon__title">UXUI 영역 — 준비중</h1>
    <p class="coming-soon__subtitle">UX 시나리오, UI 키스크린, UI 사양서 작업이 곧 시작됩니다.</p>

    <div class="coming-soon__sections">
      <div class="coming-soon__item">
        <div>
          <div class="coming-soon__item-name">UX Scenario</div>
          <div class="coming-soon__item-desc">사용자 시나리오 · 사용자 여정 · 태스크 흐름</div>
        </div>
        <span class="coming-soon__badge">준비중</span>
      </div>
      <div class="coming-soon__item">
        <div>
          <div class="coming-soon__item-name">UI Keyscreen</div>
          <div class="coming-soon__item-desc">핵심 화면 디자인 · 와이어프레임 · 시각 가이드</div>
        </div>
        <span class="coming-soon__badge">준비중</span>
      </div>
      <div class="coming-soon__item">
        <div>
          <div class="coming-soon__item-name">UI Specification</div>
          <div class="coming-soon__item-desc">화면별 사양서 · 인터랙션 정의 · 컴포넌트 명세</div>
        </div>
        <span class="coming-soon__badge">준비중</span>
      </div>
    </div>
  </div>
</main>

<script src="nav.js"></script>
</body>
</html>
