<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMS Docs · QA · Test Cases</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-top="qa" data-sub="test-cases" data-meta="RMS Docs · v0.3">

<main class="index-main">

  <aside class="side-panel">
    <h3 class="side-panel__title">Filters</h3>

    <div class="side-panel__search">
      <input type="text" class="search-box" id="search-input" placeholder="TC_ID, 제목, 화면명...">
    </div>

    <div class="filter-group">
      <label class="filter-group__label">영역 (Area)</label>
      <div class="filter-group__options" id="filter-areas"></div>
    </div>

    <div class="filter-group">
      <label class="filter-group__label">우선순위 (Priority)</label>
      <div class="filter-group__options" id="filter-priorities"></div>
    </div>

    <div class="filter-group">
      <label class="filter-group__label">유형 (Type)</label>
      <div class="filter-group__options" id="filter-types"></div>
    </div>

    <button type="button" class="btn-reset" id="btn-reset">필터 초기화</button>
  </aside>

  <section class="content-panel">

    <div class="content-panel__header">
      <h2 class="content-panel__title">Recipe Management System · Test Case Index</h2>
      <div class="content-panel__subtitle">
        Park Systems 장비의 Recipe · Method 관리 시스템에 대한 QA 테스트 케이스 정의서
      </div>
    </div>

    <div class="stat-strip">
      <div class="stat-cell stat-cell--accent">
        <div class="stat-cell__label">Total TC</div>
        <div class="stat-cell__value" id="stat-total">— <span class="unit">건</span></div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell__label">Critical</div>
        <div class="stat-cell__value" id="stat-critical">— <span class="unit">건</span></div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell__label">Areas</div>
        <div class="stat-cell__value" id="stat-areas">— <span class="unit">영역</span></div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell__label">Screens</div>
        <div class="stat-cell__value" id="stat-screens">— <span class="unit">화면</span></div>
      </div>
    </div>

    <div class="tc-table-bar">
      <div class="tc-table-bar__count" id="tc-count">—</div>
      <div class="tc-table-bar__hint">상세 페이지가 있는 TC만 링크 활성화</div>
    </div>

    <div class="tc-table-wrap">
      <table class="tc-table">
        <thead>
          <tr>
            <th style="width: 170px;">TC ID</th>
            <th>제목</th>
            <th style="width: 100px;">Type</th>
            <th style="width: 90px;">Priority</th>
            <th style="width: 230px;">영역 · 화면</th>
          </tr>
        </thead>
        <tbody id="tc-tbody"></tbody>
      </table>
    </div>

  </section>

</main>

<script src="testcases.js"></script>
<script src="script.js"></script>
<script src="nav.js"></script>
</body>
</html>
